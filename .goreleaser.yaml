version: 2
project_name: twilio-jobs-pp-cli-pp-cli
changelog:
  disable: true
builds:
  - id: twilio-jobs-pp-cli-pp-cli
    main: ./cmd/twilio-jobs-pp-cli-pp-cli
    binary: twilio-jobs-pp-cli-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X twilio-jobs-pp-cli-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: twilio-jobs-pp-cli-pp-mcp
    main: ./cmd/twilio-jobs-pp-cli-pp-mcp
    binary: twilio-jobs-pp-cli-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: twilio-jobs-pp-cli-pp-cli
    repository:
      owner: daniele-cruciani
      name: homebrew-tap
    homepage: "https://github.com/daniele-cruciani/twilio-jobs-pp-cli-pp-cli"
    description: "API for accessing Twilio job postings"
    install: |
      bin.install "twilio-jobs-pp-cli-pp-cli"
      bin.install "twilio-jobs-pp-cli-pp-mcp"
